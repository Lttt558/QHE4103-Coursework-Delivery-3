<?php
// Logic for add_vehicle.php
session_start();
include 'db_connect.php'; // Include the database connection file

// Check if the form was submitted
if (isset($_POST['submit_add'])) {
    // 1. Get form data
    $make = $_POST['make'];
    $model = $_POST['model'];
    $year = $_POST['year'];
    $price = $_POST['price'];
    
    // 2. Get current seller ID from Session (from Member A's login)
    $seller_id = $_SESSION['user_id'];

    // 3. SQL Statement
    // Assuming table name is 'vehicles'
    $sql = "INSERT INTO vehicles (make, model, year, price, seller_id) VALUES (?, ?, ?, ?, ?)";
    
    // 4. Execute using Prepared Statement
    if ($stmt = $conn->prepare($sql)) {
        $stmt->bind_param("ssidi", $make, $model, $year, $price, $seller_id);
        
        if ($stmt->execute()) {
            // Success message in English
            echo "<script>alert('Vehicle listed successfully!'); window.location.href='add_vehicle.php';</script>";
        } else {
            echo "Error: Could not list vehicle." . $stmt->error;
        }
        $stmt->close();
    } else {
        echo "SQL Prepare Error: " . $conn->error;
    }
}
?>
